global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules.yml

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - 192.168.56.10:9100
          - 192.168.56.11:9100

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
