global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - rules.yml

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - ldap1.fis.epn.ec:9100
          - ldap2.fis.epn.ec:9100
          - kdc1.fis.epn.ec:9100
          - kdc2.fis.epn.ec:9100
          - edge.fis.epn.ec:9100

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
